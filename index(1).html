<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机展示网站</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}
a {
    text-decoration: none;
    color: #333;
}
.container {
    width: 1200px;
    margin: 0 auto;
}

/* 顶部导航 */
.header {
    height: 70px;
    background: #111827;
    line-height: 70px;
}
.header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.logo {
    font-size: 22px;
    color: #fff;
    font-weight: bold;
}
.nav a {
    color: #ccc;
    margin: 0 15px;
    font-size: 15px;
}
.nav a.active, .nav a:hover {
    color: #2596ff;
}
.tool-bar {
    display: flex;
    align-items: center;
    gap: 15px;
}
.top-search {
    padding: 8px 12px;
    border-radius: 4px;
    border: none;
    outline: none;
}
.cart {
    color: #fff;
    cursor: pointer;
}

/* 视频横幅区 */
.banner {
    position: relative;
    height: 400px;
    overflow: hidden;
    color: #fff;
}
.banner video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: 1;
}
.banner-text {
    position: relative;
    z-index: 2;
    padding-left: 100px;
    padding-top: 100px;
}
.banner-text h1 {
    font-size: 40px;
    margin-bottom: 15px;
}
.banner-text p {
    font-size: 18px;
    opacity: 0.9;
}
/* 音量控制按钮 */
.volume-btn {
    position: absolute;
    bottom: 20px;
    right: 30px;
    z-index: 3;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 产品区域 - 三张卡片同行布局 */
.main {
    padding: 60px 0;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
}
.title {
    font-size: 28px;
    text-align: center;
    margin-bottom: 40px;
    color: #222;
}
.product-grid {
    display: flex;
    gap: 20px;
    justify-content: space-between;
    flex-wrap: wrap;
}
.product-card {
    flex: 1;
    min-width: 300px;
    max-width: 380px;
    height: 350px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}
.card-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 0.5s ease;
}
.product-card:hover .card-bg {
    transform: scale(1.05);
}
/* 文字统一为白色，在所有背景上都清晰可见 */
.card-content {
    position: absolute;
    top: 30px;
    left: 30px;
    z-index: 2;
    color: #fff;
}
.card-content .tag {
    font-size: 13px;
    color: #fff;
    margin-bottom: 8px;
}
.card-content h3 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 10px;
}
.card-content .desc {
    font-size: 16px;
    color: #fff;
    margin-bottom: 20px;
}
/* 按钮组 - 移到卡片底部 */
.card-buttons {
    position: absolute;
    bottom: 30px;
    left: 30px;
    display: flex;
    gap: 15px;
    z-index: 2;
}
/* 立即购买：保持蓝色 */
.buy-btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: none;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.3s;
}
.buy-btn.primary {
    background: #007aff;
    color: #fff;
}
.buy-btn.primary:hover {
    background: #0066cc;
}
/* 了解更多：白底黑边 */
.learn-btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: 1px solid #333;
    background: #fff;
    color: #333;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}
.learn-btn:hover {
    background: #f5f5f5;
}

/* 页脚 */
.footer {
    height: 80px;
    line-height: 80px;
    background: #111827;
    color: #ccc;
    text-align: center;
    font-size: 14px;
}

/* 右下角打开客服按钮 */
.open-chat-btn {
    position: fixed;
    right: 30px;
    bottom: 30px;
    width: 90px;
    height: 90px;
    background: #2596ff;
    color: #fff;
    border-radius: 50%;
    text-align: center;
    line-height: 90px;
    cursor: pointer;
    font-size: 22px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 998;
}

/* AI聊天弹窗：加宽、缩短高度 */
.chat-popup {
    position: fixed;
    right: 0;
    top: 20px;
    width: 32vw;
    max-width: 420px;
    height: 80vh;
    box-shadow: -5px 0 20px rgba(0,0,0,0.15);
    overflow: hidden;
    z-index: 999;
    display: block;
    background: #fff;
    border-radius: 8px 0 0 8px;
}
.chat-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}
.chat-header {
    padding: 18px 20px;
    background: #2596ff;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    cursor: move;
}
.close-btn {
    font-size: 20px;
    cursor: pointer;
}
.search-box {
    display: none;
}
.chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    background-color: #f8f9fa;
}
.message {
    margin-bottom: 18px;
    display: flex;
    align-items: flex-end;
}
.message.user {
    justify-content: flex-end;
}
.message.ai {
    justify-content: flex-start;
}

/* 放大聊天头像 */
.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    background: #f0f0f0;
    margin: 0 10px;
    flex-shrink: 0;
}
.user .avatar {
    background: #2596ff;
    color: white;
}

/* 消息气泡 */
.message-bubble {
    max-width: 90%;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.7;
    font-size: 15px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.user .message-bubble {
    background: #2596ff;
    color: white;
    border-bottom-right-radius: 4px;
}
.ai .message-bubble {
    background-color: #ffffff;
    color: #333;
    border-bottom-left-radius: 4px;
}

/* 输入区域 */
.chat-input-area {
    display: flex;
    padding: 15px 20px;
    background: #fff;
    border-top: 1px solid #eee;
}
#userInput {
    flex: 1;
    padding: 12px 18px;
    border: 1px solid #ddd;
    border-radius: 24px;
    outline: none;
    font-size: 15px;
}
#sendBtn {
    margin-left: 12px;
    padding: 12px 24px;
    background: #2596ff;
    color: white;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-size: 15px;
}
#sendBtn:disabled {
    background: #94bfff;
    cursor: not-allowed;
}

/* 打字光标动画 */
.typing::after {
    content: '|';
    animation: blink 0.7s infinite;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="container">
            <div class="logo">无人机商城</div>
            <div class="nav">
                <a href="#" class="active">首页</a>
                <a href="#">产品</a>
                <a href="#">教程</a>
                <a href="#">售后</a>
                <a href="#">关于我们</a>
            </div>
            <div class="tool-bar">
                <input class="top-search" type="text" placeholder="搜索产品">
                <div class="cart">🛒 购物车</div>
            </div>
        </div>
    </div>

    <!-- 视频横幅 -->
    <div class="banner">
        <video id="bannerVideo" autoplay loop muted playsinline>
            <source src="video/dji.mp4" type="video/mp4">
        </video>
        <div class="banner-text">
            <h1>专业航拍无人机</h1>
            <p>高清画质 · 稳定飞行 · 智能操控</p>
        </div>
        <button class="volume-btn" id="volumeBtn">🔇</button>
    </div>

    <!-- 产品区域 -->
    <div class="main">
        <h2 class="title">热门产品</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="card-bg" style="background-image: url('./images/mini.png');"></div>
                <div class="card-content">
                    <p class="tag">全能迷你航拍机</p>
                    <h3>DJI Mini 5 Pro</h3>
                    <p class="desc">小有底气</p>
                </div>
                <div class="card-buttons">
                    <button class="buy-btn primary">立即购买</button>
                    <button class="learn-btn">了解更多</button>
                </div>
            </div>
            <div class="product-card">
                <div class="card-bg" style="background-image: url('./images/qijian.png');"></div>
                <div class="card-content">
                    <p class="tag">旗舰影像航拍机</p>
                    <h3>DJI 旗舰系列</h3>
                    <p class="desc">天地为你所动</p>
                </div>
                <div class="card-buttons">
                    <button class="buy-btn primary">立即购买</button>
                    <button class="learn-btn">了解更多</button>
                </div>
            </div>
            <div class="product-card">
                <div class="card-bg" style="background-image: url('./images/ny.png');"></div>
                <div class="card-content">
                    <p class="tag">行业级作业无人机</p>
                    <h3>DJI 行业系列</h3>
                    <p class="desc">专业高效 安全可靠</p>
                </div>
                <div class="card-buttons">
                    <button class="buy-btn primary">立即购买</button>
                    <button class="learn-btn">了解更多</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        © 2026 无人机商城 版权所有
    </div>

    <!-- 右下角打开客服按钮 -->
    <div class="open-chat-btn" id="openChatBtn">客服</div>

    <!-- AI聊天弹窗 -->
    <div class="chat-popup" id="chatPopup">
        <div class="chat-container">
            <div class="chat-header" id="dragHandle">
                <span>AI咨询窗口</span>
                <span class="close-btn" id="closeChat">×</span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="请输入问题...">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

   <script src="axios.min.js"></script>
<script src="main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const chatPopup = document.getElementById('chatPopup');
            const openChatBtn = document.getElementById('openChatBtn');

            openChatBtn.addEventListener('click', function(){
                chatPopup.style.left = "";
                chatPopup.style.top = "";
                chatPopup.style.display = 'block';
            });
        });
    </script>
</body>
</html>
